_metadata:
  major_version: 2
  minor_version: 1

display_information:
  name: GitHub PR Router
  description: Routes small GitHub PRs into Slack with summaries and diffs; leaves large PRs on GitHub for Copilot.
  background_color: "#f06c00"
  long_description: Demo bot for Sainsbury's mobile sample app. GitHub Actions measures PR size — small changes (under the line threshold) are posted to #project-mobile with the PR link, file list, and unified diff. Large PRs skip Slack so reviewers can use GitHub Copilot on the full change set.

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: true
  bot_user:
    display_name: GitHub PR Router
    always_online: true

oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - files:write
      - channels:read
      - groups:read

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
