_metadata:
  major_version: 2
  minor_version: 1

display_information:
  name: GitHub PR Router
  description: Routes GitHub PR summaries and live links into Slack for Enterprise Search and Copilot review.
  background_color: "#f06c00"
  long_description: Demo bot for Sainsbury's mobile sample app. GitHub Actions measures PR size and posts summaries with direct GitHub PR and files links to #project-mobile. Diff files remain in GitHub so Slack Enterprise Search uses the indexed GitHub source.

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: true
  bot_user:
    display_name: GitHub PR Router
    always_online: true

oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - channels:read
      - groups:read

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
