name: PR route to Slack

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  route-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Measure PR size and route
        env:
          GH_TOKEN: ${{ github.token }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SMALL_PR_MAX_LINES: ${{ vars.SMALL_PR_MAX_LINES }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
          DIFF_URL: ${{ github.event.pull_request.html_url }}/files
        run: |
          set -euo pipefail

          CHANNEL="${SLACK_CHANNEL_ID:-C0BGHB7JNLX}"
          MAX="${SMALL_PR_MAX_LINES:-120}"

          if [ -z "${SLACK_BOT_TOKEN:-}" ]; then
            echo "::error::SLACK_BOT_TOKEN secret is not set"
            exit 1
          fi

          STATS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '{additions,deletions,changed_files}')
          ADD=$(echo "$STATS" | jq -r .additions)
          DEL=$(echo "$STATS" | jq -r .deletions)
          FILES=$(echo "$STATS" | jq -r .changed_files)
          TOTAL=$((ADD + DEL))

          echo "PR #${PR_NUMBER}: +${ADD}/-${DEL} (${TOTAL} lines across ${FILES} files); threshold=${MAX}"

          FILE_LIST=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --jq '[.[] | "• `\(.filename)` (+ \(.additions)/- \(.deletions))"] | join("\n")')

          export CHANNEL ADD DEL FILES MAX FILE_LIST TOTAL

          if [ "$TOTAL" -gt "$MAX" ]; then
            ROUTE=large
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(cat <<EOF
          ## Large PR — routed to GitHub Copilot

          This change is **${TOTAL} lines** (+${ADD}/-${DEL} across ${FILES} files), above the Slack review threshold of **${MAX}** lines.

          - **Slack:** summary and direct GitHub links only
          - **Next:** use **GitHub Copilot** code review on this PR for the large change
          EOF
          )"
          else
            ROUTE=small
          fi
          export ROUTE

          python3 <<'PY'
          import json, os, urllib.request

          token = os.environ["SLACK_BOT_TOKEN"]
          channel = os.environ["CHANNEL"]
          route = os.environ["ROUTE"]
          pr_number = os.environ["PR_NUMBER"]
          pr_title = os.environ["PR_TITLE"]
          pr_url = os.environ["PR_URL"]
          pr_user = os.environ["PR_USER"]
          pr_base = os.environ["PR_BASE"]
          pr_head = os.environ["PR_HEAD"]
          add = os.environ["ADD"]
          delete = os.environ["DEL"]
          files = os.environ["FILES"]
          max_lines = os.environ["MAX"]
          file_list = os.environ.get("FILE_LIST", "")
          diff_url = os.environ["DIFF_URL"]

          def slack_api(method, payload=None):
              headers = {"Authorization": f"Bearer {token}"}
              data = json.dumps(payload or {}).encode("utf-8")
              headers["Content-Type"] = "application/json; charset=utf-8"
              req = urllib.request.Request(
                  f"https://slack.com/api/{method}",
                  data=data,
                  headers=headers,
                  method="POST",
              )
              with urllib.request.urlopen(req) as resp:
                  body = json.loads(resp.read().decode("utf-8"))
              if not body.get("ok"):
                  raise SystemExit(f"Slack API {method} error: {body}")
              return body

          size_line = (
              f"Size: *+{add}/-{delete}* ({files} files) · "
              f"threshold `{max_lines}` lines"
          )
          # Keep a raw github.com URL in-message so Slack AI / Enterprise Search
          # can open the PR without relying on repo indexing alone.
          summary = (
              f"*<{pr_url}|#{pr_number} {pr_title}>*\n"
              f"PR URL: {pr_url}\n"
              f"Repo: https://github.com/{os.environ['REPO']}\n"
              f"Author: `{pr_user}` · `{pr_base}` ← `{pr_head}`\n"
              f"{size_line}"
          )

          if route == "large":
              fallback = (
                  f"Large PR routed to GitHub Copilot: {pr_title}\n"
                  f"{pr_url}\n"
                  f"Branch: {pr_head}"
              )
              payload = {
                  "channel": channel,
                  "text": fallback,
                  "unfurl_links": True,
                  "unfurl_media": True,
                  "blocks": [
                      {
                          "type": "header",
                          "text": {
                              "type": "plain_text",
                              "text": "Large PR → GitHub Copilot",
                              "emoji": True,
                          },
                      },
                      {"type": "section", "text": {"type": "mrkdwn", "text": summary}},
                      {
                          "type": "section",
                          "text": {
                              "type": "mrkdwn",
                              "text": (
                                  "Review the full change in *GitHub* with Copilot. "
                                  "Slack Enterprise Search should use the live PR and repository URLs."
                              ),
                          },
                      },
                      {
                          "type": "actions",
                          "elements": [
                              {
                                  "type": "button",
                                  "text": {"type": "plain_text", "text": "Open PR", "emoji": True},
                                  "url": pr_url,
                              },
                              {
                                  "type": "button",
                                  "text": {"type": "plain_text", "text": "View files", "emoji": True},
                                  "url": diff_url,
                              },
                          ],
                      },
                  ],
              }
              slack_api("chat.postMessage", payload=payload)
              print(f"Posted large-PR GitHub link for #{pr_number}")
          else:
              files_block = f"*Files*\n{file_list}" if file_list else "*Files*\n_(none)_"
              if len(files_block) > 2900:
                  files_block = files_block[:2900] + "\n…"
              fallback = (
                  f"Small PR ready for Slack review: {pr_title}\n"
                  f"{pr_url}\n"
                  f"Branch: {pr_head}"
              )
              payload = {
                  "channel": channel,
                  "text": fallback,
                  "unfurl_links": True,
                  "unfurl_media": True,
                  "blocks": [
                      {
                          "type": "header",
                          "text": {
                              "type": "plain_text",
                              "text": "Small PR → Slack review",
                              "emoji": True,
                          },
                      },
                      {"type": "section", "text": {"type": "mrkdwn", "text": summary}},
                      {"type": "section", "text": {"type": "mrkdwn", "text": files_block}},
                      {
                          "type": "context",
                          "elements": [
                              {
                                  "type": "mrkdwn",
                                  "text": "Review the live PR through GitHub Enterprise Search; no diff is copied into Slack.",
                              }
                          ],
                      },
                  ],
              }
              slack_api("chat.postMessage", payload=payload)
              print(f"Posted small PR #{pr_number} summary + GitHub links")
          PY
